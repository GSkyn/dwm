#################################
#             Shadows           #
#################################
# shadow = false; # Disabling shadows is the fastest way to gain speed

#################################
#            Blur               #
#################################


#################################
#           Fading              #
#################################
# Fast fading: High steps and low intervals make it feel instant but smooth
fading = false;
fade-in-step = 0.04;   # Default is usually 0.03
fade-out-step = 0.04;  # Default is usually 0.03
fade-delta = 3;        # Lower is faster (time between steps in ms)

#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

#################################
#           Corners             #
#################################
# corner-radius = 0; # Rounding adds overhead; 0 is fastest

#################################
#       General Settings        #
#################################

# Backend to use: "xrender" or "glx". 
# GLX is almost always faster on modern hardware.
backend = "xrender";
use-damage = true;

# IMPORTANT: This prevents lag in full-screen games/video
unredir-if-possible = true;

vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
